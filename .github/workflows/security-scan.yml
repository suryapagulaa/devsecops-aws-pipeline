name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  checkov:
    name: Checkov IaC scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan CloudFormation
        uses: bridgecrewio/checkov-action@master
        with:
          directory: cloudformation/
          framework: cloudformation
          output_format: sarif
          output_file_path: checkov-cfn.sarif
          config_file: .checkov.yaml

      - name: Scan Dockerfile
        uses: bridgecrewio/checkov-action@master
        with:
          directory: docker/
          framework: dockerfile
          config_file: .checkov.yaml

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-cfn.sarif
          category: checkov

  trivy:
    name: Trivy scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t scan-target:${{ github.sha }} docker/

      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-target:${{ github.sha }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy

      - name: Scan IaC config
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'

  iam-check:
    name: IAM compliance
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install boto3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - run: python scripts/iam_compliance_check.py
